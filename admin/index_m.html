<html>

<head>

    <!-- Load ioBroker scripts and styles-->
    <link rel="stylesheet" type="text/css" href="../../css/adapter.css" />
    <link rel="stylesheet" type="text/css" href="../../lib/css/materialize.css">

    <script type="text/javascript" src="../../lib/js/jquery-3.2.1.min.js"></script>
    <script type="text/javascript" src="../../socket.io/socket.io.js"></script>

    <script type="text/javascript" src="../../js/translate.js"></script>
    <script type="text/javascript" src="../../lib/js/materialize.js"></script>
    <script type="text/javascript" src="../../js/adapter-settings.js"></script>

    <!-- Load our own files -->
    <link rel="stylesheet" type="text/css" href="style.css" />
    <script type="text/javascript" src="words.js"></script>

    <script type="text/javascript">
        // This will be called by the admin adapter when the settings page loads
        function load(settings, onChange) {
            if (!settings) return;
            $('.value').each(function () {
                var $key = $(this);
                var id = $key.attr('id');
                if ($key.attr('type') === 'checkbox') {
                    $key.prop('checked', settings[id])
                        .on('change', () => onChange());
                } else {
                    $key.val(settings[id])
                        .on('change', () => onChange())
                        .on('keyup', () => onChange());
                }
            });
            onChange(false);
            if (M) M.updateTextFields();
        }

        // This will be called by the admin adapter when the user presses the save button
        function save(callback) {
            var obj = {};
            $('.value').each(function () {
                var $this = $(this);
                if ($this.attr('type') === 'checkbox') {
                    obj[$this.attr('id')] = $this.prop('checked');
                } else if ($this.attr('type') === 'number') {
                    obj[$this.attr('id')] = parseFloat($this.val());
                } else {
                    obj[$this.attr('id')] = $this.val();
                }
            });
            callback(obj);
        }

        function doLogin() {
            var username = $('#loginUsername').val().trim();
            var password = $('#loginPassword').val();
            if (!username || !password) {
                $('#loginStatus').text('Please enter email and password.').css('color', 'orange');
                return;
            }
            $('#loginStatus').text('Logging in...').css('color', '#aaa');
            $('#loginBtn').addClass('disabled');
            sendTo('porsche.0', 'loginWithCredentials', { username: username, password: password }, function (result) {
                $('#loginBtn').removeClass('disabled');
                if (result.error) {
                    $('#loginStatus').text('Error: ' + result.error).css('color', 'red');
                    return;
                }
                $('#refreshToken').val(result.refreshToken).trigger('change');
                if (M) M.updateTextFields();
                $('#loginStatus').text('✓ Login successful! Click Save to apply.').css('color', '#4caf50');
            });
        }
    </script>

</head>

<body>

    <div class="m adapter-container">

        <div class="row">
            <div class="col s12 m4 l2">
                <img src="porsche.png" class="logo">
            </div>
        </div>

        <!-- Login flow -->
        <div class="row">
            <div class="col s12 m6 input-field">
                <input type="email" id="loginUsername" />
                <label for="loginUsername" class="translate">Porsche ID (Email)</label>
            </div>
        </div>
        <div class="row">
            <div class="col s12 m6 input-field">
                <input type="password" id="loginPassword" />
                <label for="loginPassword" class="translate">Password</label>
            </div>
        </div>
        <div class="row">
            <div class="col s12">
                <a id="loginBtn" class="waves-effect waves-light btn" onclick="doLogin()">
                    <i class="material-icons left">vpn_key</i><span class="translate">Get Token</span>
                </a>
                <span id="loginStatus" style="margin-left:12px;font-size:0.85em;"></span>
            </div>
        </div>

        <!-- Token field -->
        <div class="row">
            <div class="col s12 input-field">
                <input type="password" class="value" id="refreshToken" />
                <label for="refreshToken" class="translate">Refresh Token</label>
            </div>
        </div>

        <div class="row">
            <div class="col s2 input-field">
                <input type="number" class="value" id="interval" />
                <label for="interval" class="translate">Update interval in minutes</label>
            </div>
        </div>
    </div>

</body>

</html>
